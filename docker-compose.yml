services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: oracle
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oracle}
      POSTGRES_DB: oracle
    ports:
      - "${PUBLISHED_BIND_HOST:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oracle -d oracle"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "${PUBLISHED_BIND_HOST:-127.0.0.1}:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  oracle:
    build:
      context: .
      dockerfile: crates/oracle/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgres://oracle:${POSTGRES_PASSWORD:-oracle}@postgres:5432/oracle
      REDIS_URL: redis://redis:6379/0
      HTTP_BIND: 0.0.0.0:8080
    ports:
      - "${PUBLISHED_BIND_HOST:-127.0.0.1}:${ORACLE_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: workers/python
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://oracle:${POSTGRES_PASSWORD:-oracle}@postgres:5432/oracle
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  dashboard:
    build:
      context: apps/dashboard
    environment:
      ORACLE_BASE_URL: http://oracle:8080
      PUBLIC_ORACLE_BASE_URL: ${PUBLIC_ORACLE_BASE_URL:-}
      HOST: 0.0.0.0
      PORT: 3000
    ports:
      - "${PUBLISHED_BIND_HOST:-127.0.0.1}:${DASHBOARD_PORT:-3000}:3000"
    depends_on:
      - oracle

volumes:
  postgres_data:
